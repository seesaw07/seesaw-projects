<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener | seesaw07</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🔗 URL Shortener</h1>
        <p class="subtitle">Make your long URLs short and shareable</p>

        <!-- Input Section -->
        <div class="input-section">
            <input type="url" id="url-input" placeholder="Enter your long URL here...">
            <button onclick="shortenUrl()" class="btn">Shorten</button>
        </div>

        <!-- Result Section -->
        <div id="result" class="result hidden">
            <p>Your short URL:</p>
            <div class="short-url-box">
                <input type="text" id="short-url" readonly>
                <button onclick="copyUrl()" class="copy-btn">Copy</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <strong id="total-urls">0</strong>
                <span>URLs Created</span>
            </div>
            <div class="stat-item">
                <strong id="total-clicks">0</strong>
                <span>Total Clicks</span>
            </div>
        </div>

        <!-- URL List -->
        <div class="url-list">
            <h2>Recent URLs</h2>
            <div id="urls-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
