<!DOCTYPE html>
<html>
<head>
    <title>Todo App | seesaw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Todo App</h1>
        
        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="task-input" placeholder="Add a new task...">
            <button onclick="addTask()" class="add-btn">Add</button>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <span>Total: <strong id="total">0</strong></span>
            <span>Completed: <strong id="completed">0</strong></span>
            <span>Pending: <strong id="pending">0</strong></span>
        </div>
        
        <!-- Filter Buttons -->
        <div class="filters">
            <button onclick="filterTasks('all')" class="filter-btn active" id="filter-all">All</button>
            <button onclick="filterTasks('pending')" class="filter-btn" id="filter-pending">Pending</button>
            <button onclick="filterTasks('completed')" class="filter-btn" id="filter-completed">Completed</button>
        </div>
        
        <!-- Todo List -->
        <ul id="todo-list" class="todo-list">
            <!-- Tasks will appear here -->
        </ul>
        
        <!-- Clear All -->
        <button onclick="clearAll()" class="clear-btn">Clear All</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
