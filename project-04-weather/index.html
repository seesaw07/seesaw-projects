<!DOCTYPE html>
<html>
<head>
    <title>Weather App | seesaw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌤️ Weather App</h1>
        
        <!-- Search Section -->
        <div class="search-section">
            <input type="text" id="city-input" placeholder="Enter city name...">
            <button onclick="getWeather()" class="search-btn">Search</button>
        </div>
        
        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
        
        <!-- Error Message -->
        <div id="error" class="error hidden">
            <p>City not found. Try again!</p>
        </div>
        
        <!-- Weather Result -->
        <div id="weather-result" class="weather-result hidden">
            <h2 id="city-name">City Name</h2>
            <img id="weather-icon" src="" alt="weather icon">
            <p id="temperature" class="temperature">--°C</p>
            <p id="description" class="description">--</p>
            
            <div class="details">
                <div class="detail-item">
                    <span>💧 Humidity</span>
                    <strong id="humidity">--%</strong>
                </div>
                <div class="detail-item">
                    <span>💨 Wind</span>
                    <strong id="wind">-- km/h</strong>
                </div>
                <div class="detail-item">
                    <span>🌡️ Feels Like</span>
                    <strong id="feels-like">--°C</strong>
                </div>
                <div class="detail-item">
                    <span>👁️ Visibility</span>
                    <strong id="visibility">-- km</strong>
                </div>
            </div>
        </div>
        
        <!-- Recent Searches -->
        <div id="recent" class="recent hidden">
            <h3>Recent Searches</h3>
            <div id="recent-list" class="recent-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
