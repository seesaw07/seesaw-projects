<!DOCTYPE html>
<html>
<head>
    <title>seesaw</title>
    <style>
        body {
            background-color: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .card {
            background: #16213e;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: white;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        h1 {
            color: #e94560;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="avatar.svg" alt="seesaw" class="avatar">
        <h1>@seesaw</h1>
        <p>Full Stack Developer</p>
        <p>🌐 Remote Ready</p>
    </div>
</body>
</html>
